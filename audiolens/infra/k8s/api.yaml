apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiolens-api
  labels: { app: audiolens-api }
spec:
  replicas: 3
  selector: { matchLabels: { app: audiolens-api } }
  template:
    metadata: { labels: { app: audiolens-api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/audiolens/api:latest
          ports: [{ containerPort: 8000 }]
          envFrom: [{ secretRef: { name: audiolens-env } }]
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata: { name: audiolens-api }
spec:
  selector: { app: audiolens-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: audiolens-api }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: audiolens-api }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }

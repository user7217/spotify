version: "3.9"

x-env: &shared-env
  PG_HOST: postgres
  PG_USER: audiolens
  PG_PASSWORD: audiolens
  PG_DB: audiolens
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP: kafka:9092
  S3_ENDPOINT: minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: audiolens
      POSTGRES_PASSWORD: audiolens
      POSTGRES_DB: audiolens
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiolens"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9092:9092"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/audio local/artifacts;
      exit 0"

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      <<: *shared-env
      DATABASE_URL: postgresql+psycopg://audiolens:audiolens@postgres:5432/audiolens
    command: alembic upgrade head

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
      minio-init: { condition: service_completed_successfully }
      migrate: { condition: service_completed_successfully }
    environment: *shared-env
    ports: ["8000:8000"]

  extractor:
    build:
      context: .
      dockerfile: infra/docker/extractor.Dockerfile
    depends_on:
      api: { condition: service_started }
    environment: *shared-env
    volumes:
      - ./models:/models:ro  # essentia pretrained .pb files (optional)
    deploy:
      replicas: 2

volumes:
  pgdata:
  miniodata:
